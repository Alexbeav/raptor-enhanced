name: build

on:
  push:
  pull_request:

jobs:
  windows-x64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: microsoft/setup-msbuild@v2
      - name: Build Release x64
        run: msbuild msvc/raptor.sln /m /v:minimal /p:Configuration=Release /p:Platform=x64
      - name: Verify CMake Release build
        # CMAKE_POLICY_VERSION_MINIMUM: the vendored SDL2 config declares
        # cmake_minimum_required 3.0, which CMake 4.x (on current runners)
        # refuses without this compatibility floor.
        run: |
          cmake -S . -B build -A x64 "-DCMAKE_POLICY_VERSION_MINIMUM=3.5"
          cmake --build build --config Release --parallel
      - uses: actions/upload-artifact@v4
        with:
          name: raptor-enhanced-x64
          path: |
            msvc/x64/Release/raptor.exe
            msvc/x64/Release/raptorsetup/raptorsetup.exe

  linux-x64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libsdl2-dev libasound2-dev
      - name: Build Release
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release "-DCMAKE_POLICY_VERSION_MINIMUM=3.5"
          cmake --build build --parallel
      - uses: actions/upload-artifact@v4
        with:
          name: raptor-enhanced-linux-x64
          path: |
            build/bin/raptor
            build/bin/raptorsetup

  release:
    # Runs on version tags (v*): assembles the same package layout as the
    # hand-made releases (payload from pkg/release/) plus a Linux tarball,
    # and attaches both to a DRAFT release — review the notes, then publish.
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [windows-x64, linux-x64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Assemble packages
        run: |
          VER="${GITHUB_REF_NAME#v}"
          # Windows zip: payload + freshly built exes
          mkdir -p RaptorEnhanced
          cp -r pkg/release/. RaptorEnhanced/
          find artifacts/raptor-enhanced-x64 -name "*.exe" -exec cp {} RaptorEnhanced/ \;
          zip -r "RaptorEnhanced-$VER.zip" RaptorEnhanced
          # Linux tarball: payload minus Windows bits + Linux binaries
          mkdir -p "RaptorEnhanced-linux/DeltaSector-optional"
          cp pkg/release/COPYING.txt pkg/release/README.txt pkg/release/SOURCE.txt pkg/release/SETUP.INI RaptorEnhanced-linux/
          cp pkg/release/DeltaSector-optional/install_delta_sector.py pkg/release/DeltaSector-optional/raptor_glb.py pkg/release/DeltaSector-optional/README.txt "RaptorEnhanced-linux/DeltaSector-optional/"
          cp artifacts/raptor-enhanced-linux-x64/raptor artifacts/raptor-enhanced-linux-x64/raptorsetup RaptorEnhanced-linux/
          chmod +x RaptorEnhanced-linux/raptor RaptorEnhanced-linux/raptorsetup
          tar -czf "RaptorEnhanced-$VER-linux-x64.tar.gz" --transform "s|^RaptorEnhanced-linux|RaptorEnhanced|" RaptorEnhanced-linux
      - name: Create or update draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VER="${GITHUB_REF_NAME#v}"
          if ! gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
              --title "Raptor Enhanced $VER" --draft --generate-notes
          fi
          gh release upload "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --clobber \
            "RaptorEnhanced-$VER.zip" "RaptorEnhanced-$VER-linux-x64.tar.gz"
